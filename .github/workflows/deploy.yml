name: CI/CD Pipeline - Deploy Payment Service

on:
  push:
    branches:
      - main # Triggers when code is pushed to your production branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_USERNAME }}/payment-service:latest

  deploy-to-oracle-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Oracle Cloud VM & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the deployment environment directory
            mkdir -p ~/payment-service-deployment
            cd ~/payment-service-deployment

            # Create or update the docker-compose environment variables config file
            echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" > .env

            # Download or write the docker-compose structure on the machine
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              payment-db:
                image: mysql:8.0
                container_name: payment-mysql-db
                environment:
                  MYSQL_ROOT_PASSWORD: "Som1234567"
                  MYSQL_DATABASE: "micro_service_payment_db"
                ports:
                  - "3306:3306"
                volumes:
                  - mysql_payment_data:/var/lib/mysql
                networks:
                  - ecart-network
                restart: always

              payment-service:
                image: ${REGISTRY_USERNAME}/payment-service:latest
                container_name: payment-service-app
                ports:
                  - "8083:8083"
                environment:
                  SPRING_DATASOURCE_URL: "jdbc:mysql://payment-db:3306/micro_service_payment_db?createDatabaseIfNotExist=true"
                  SPRING_DATASOURCE_USERNAME: "root"
                  SPRING_DATASOURCE_PASSWORD: "Som1234567"
                  EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: "http://localhost:8761/eureka/"
                depends_on:
                  - payment-db
                networks:
                  - ecart-network
                restart: unless-stopped

            volumes:
              mysql_payment_data:

            networks:
              ecart-network:
                driver: bridge
            EOF

            # Authenticate to download the fresh image from private/public Docker registries
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            # Pull latest system images and restart containers dynamically
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d

